name: agropilot_ai
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  http: ^1.6.0
  flutter_local_notifications: ^21.0.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_database: ^11.3.5
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.5.1

  # Local Storage
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  min_sdk_android: 23